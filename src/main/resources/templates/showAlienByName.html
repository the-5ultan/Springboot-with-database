<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Details</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            color:#333;
        }

        /* Navbar */
        nav{
            background:#1f2937;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:30px;
            font-weight:bold;
        }

        .search-bar input{
            padding:8px 14px;
            border:none;
            border-radius:20px;
            width:220px;
            outline:none;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        .nav-links a:hover{
            color:#60a5fa;
        }

        /* Container */

        .container{
            width:650px;
            margin:60px auto;
            text-align:center;
        }

        h1{
            margin-bottom:30px;
            color:#1f2937;
        }

        /* Alien Card */

        .alien-info{

            background:white;
            border-radius:15px;
            padding:25px;
            margin-bottom:25px;
            text-align:left;
            border:1px solid #ddd;
            box-shadow:0 4px 12px rgba(0,0,0,.1);

        }

        .alien-info p{

            margin:15px 0;
            font-size:18px;

        }

        .label{

            font-weight:bold;
            color:#1f2937;

        }

        .value{

            color:#2563eb;

        }

        /* No Result */

        .no-result{

            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);

        }

        .no-result h2{

            color:red;
            margin-bottom:10px;

        }

        .back-btn{

            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:10px;
            transition:.3s;

        }

        .back-btn:hover{

            background:#1d4ed8;

        }

        footer{

            margin-top:80px;
            background:#1f2937;
            color:white;
            text-align:center;
            padding:15px;

        }

    </style>
</head>
<body>

<nav>

    <div class="logo">BIG LOGO</div>

    <div class="search-bar">
        <input type="text" placeholder="Search here...">
    </div>

    <div class="nav-links">
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

</nav>

<div class="container">

    <h1>Alien Details</h1>

    <!-- No Alien Found -->

    <div class="no-result"
         th:if="${#lists.isEmpty(aliens)}">

        <h2>No Alien Found</h2>

        <p>No alien exists with the entered name.</p>

    </div>

    <!-- Display All Matching Aliens -->

    <div th:unless="${#lists.isEmpty(aliens)}">

        <div class="alien-info"
             th:each="alien : ${aliens}">

            <p>
                <span class="label">Alien ID :</span>
                <span class="value"
                      th:text="${alien.id}">
                </span>
            </p>

            <p>
                <span class="label">Alien Name :</span>
                <span class="value"
                      th:text="${alien.name}">
                </span>
            </p>

        </div>

    </div>

    <a href="/" class="back-btn">
        Back to Home
    </a>

</div>

<footer>

    <p>© 2026 Alien Registration Portal | All Rights Reserved</p>

</footer>

</body>
</html>
